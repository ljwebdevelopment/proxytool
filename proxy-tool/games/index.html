<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>
  <link rel="stylesheet" href="assets/css/site.css">
  <script src="assets/js/dashboard.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Game Hub</a>
    <div class="search-bar">
      <input id="searchInput" type="search" placeholder="Search games..." aria-label="Search games">
    </div>
  </header>

  <main class="dashboard">
    <section class="games">
      <div class="section-head">
        <h2>All Games</h2>
      </div>
      <p id="statusText" class="status-text" aria-live="polite">Loading games...</p>
      <div class="game-grid" id="gameGrid"></div>
    </section>
  </main>

  <footer class="site-footer">Local Game Library</footer>

  <template id="gameCardTemplate">
    <a class="game-card" href="#">
      <div class="game-thumb">
        <img src="" alt="">
        <span class="play-badge">PLAY</span>
      </div>
      <h3 class="game-title"></h3>
    </a>
  </template>
</body>
</html>
